<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: transparent; overflow: hidden; }
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: #333;
            border: 1px solid #eee;
            max-width: 300px; /* Taille idéale pour une iframe latérale */
            margin: auto;
        }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .card-content { padding: 10px; text-align: center; }
        .card-title { margin: 0; font-size: 1rem; color: #2c3e50; }
        .btn { color: #007bff; font-size: 0.8rem; font-weight: bold; margin-top: 5px; display: block; }
    </style>
</head>
<body>

    <div id="gallery"></div>

    <script>
        // 1. Récupérer l'ID de l'album dans l'URL (ex: ?id=printemps)
        const params = new URLSearchParams(window.location.search);
        const albumId = params.get('id');

        fetch('albums.json')
            .then(response => response.json())
            .then(data => {
                const gallery = document.getElementById('gallery');
                
                // 2. Filtrer : soit l'album précis, soit tous si pas d'ID
                const itemsToDisplay = albumId 
                    ? data.filter(a => a.id === albumId) 
                    : data;

                itemsToDisplay.forEach(album => {
                    const card = document.createElement('a');
                    card.className = 'card';
                    card.href = album.lien;
                    card.target = '_blank';
                    card.innerHTML = `
                        <img src="${album.image}" alt="${album.titre}">
                        <div class="card-content">
                            <h3 class="card-title">${album.titre}</h3>
                            <span class="btn">Ouvrir l'album Google</span>
                        </div>
                    `;
                    gallery.appendChild(card);
                });
            });
    </script>
</body>
</html>
