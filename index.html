<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        margin: 0; 
        padding: 10px; 
        /* --- MODIFICATION ICI --- */
        background-color: #000000; 
    }

    .gallery-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        align-items: start;
    }

    .card {
        text-decoration: none;
        color: inherit;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: transform 0.2s;
    }

    .card:hover { 
        transform: scale(1.02); /* Petit effet de zoom au survol au lieu de l'opacité */
    }

    .image-wrapper {
        width: 90%;          /* Passez de 70% à 90% ici */
        max-width: 350px;    /* Sécurité pour éviter que l'image ne soit trop grande */
        margin-bottom: 10px; /* Un peu plus d'espace sous l'image */
    }

    .card img {
        width: 100%;
        height: auto;
        border-radius: 6px;
        /* --- MODIFICATION ICI (Ombre plus claire pour le fond noir) --- */
        box-shadow: 0 4px 12px rgba(255,255,255,0.1);
        display: block;
        border: 1px solid #333; /* Un petit liseré gris pour détacher l'image */
    }

    .card-title {
        margin: 0;
        font-size: 0.9rem;
        font-weight: 500;
        text-align: center;
        /* --- MODIFICATION ICI --- */
        color: #ffffff; 
        line-height: 1.2;
    }
</style>
</head>
<body>

    <div class="gallery-container" id="gallery">
        </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const albumId = params.get('id');

        fetch('albums.json')
            .then(response => response.json())
            .then(data => {
                const gallery = document.getElementById('gallery');
                
                // Filtrage par ID ou affichage complet
                const itemsToDisplay = albumId 
                    ? data.filter(a => a.id === albumId) 
                    : data;

                itemsToDisplay.forEach(album => {
                    const card = document.createElement('a');
                    card.className = 'card';
                    card.href = album.lien;
                    card.target = '_blank';

                    card.innerHTML = `
                        <div class="image-wrapper">
                            <img src="${album.image}" alt="${album.titre}">
                        </div>
                        <h3 class="card-title">${album.titre}</h3>
                    `;
                    gallery.appendChild(card);
                });
            })
            .catch(err => console.error("Erreur JSON:", err));
    </script>
</body>
</html>
